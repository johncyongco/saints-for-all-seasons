<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saints for All Seasons — A Digital Catholic Spiritual Formation Library</title>
  <meta name="description" content="Companions for every season of the spiritual life. An archive of Catholic wisdom from the saints, Scripture, and Tradition.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✝</text></svg>">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="mainNav">

      <div class="nav__toggle" id="navToggle" onclick="toggleMobileNav()">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Pages Container -->
  <main id="app"></main>

  <!-- Scripts -->
  <script src="data/saints.js"></script>
  <script src="data/seasons.js"></script>
